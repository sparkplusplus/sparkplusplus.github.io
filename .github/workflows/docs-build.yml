name: Docs Build

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install docs dependencies
        run: npm install

      - name: Build docs site
        run: npm run build
